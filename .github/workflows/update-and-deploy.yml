name: Update deals and deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app.js'
      - 'search-ranking.js'
      - 'styles.css'
      - 'index.html'
      - 'sw.js'
      - 'manifest.webmanifest'
      - 'icon.svg'
      - 'site-mode.json'
      - 'data/review_demo.json'
      - 'scripts/build-pages.mjs'
      - 'data/current_offers.json'
      - 'data/product_descriptions_zh.json'
      - 'data/product_taxonomy_zh.json'
      - 'data/product_review_overrides_zh.json'
  schedule:
    # GitHub cron uses UTC. Check shortly after Copenhagen 03:00 and 15:00;
    # run both possible UTC slots and keep only the current DST match.
    - cron: '17 1 * * *'
    - cron: '17 2 * * *'
    - cron: '17 13 * * *'
    - cron: '17 14 * * *'

permissions:
  contents: read

concurrency:
  group: grocery-pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    outputs:
      should_run: ${{ steps.schedule_gate.outputs.should_run }}
      should_refresh: ${{ steps.schedule_gate.outputs.should_refresh }}
      should_deploy: ${{ steps.deploy_gate.outputs.should_deploy }}
    steps:
      - name: Select the Copenhagen 03:17 or 15:17 schedule
        id: schedule_gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "should_refresh=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "should_refresh=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          copenhagen_offset="$(TZ=Europe/Copenhagen date +%z)"
          scheduled_cron="${{ github.event.schedule }}"
          if [[ "$copenhagen_offset" == "+0200" && ( "$scheduled_cron" == "17 1 * * *" || "$scheduled_cron" == "17 13 * * *" ) ]] || \
             [[ "$copenhagen_offset" == "+0100" && ( "$scheduled_cron" == "17 2 * * *" || "$scheduled_cron" == "17 14 * * *" ) ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "should_refresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "should_refresh=false" >> "$GITHUB_OUTPUT"
          fi

      # v7
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        if: steps.schedule_gate.outputs.should_run == 'true'
      # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        if: steps.schedule_gate.outputs.should_run == 'true'
        with:
          node-version: 24
      - name: Read public site mode
        id: site_mode
        if: steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: echo "mode=$(node -e \"console.log(JSON.parse(require('fs').readFileSync('site-mode.json', 'utf8')).mode)\")" >> "$GITHUB_OUTPUT"
      - name: Refresh Aarhus offers from the public flyer feed
        if: steps.schedule_gate.outputs.should_refresh == 'true' && steps.site_mode.outputs.mode == 'live'
        run: npm run update:fallback
      - name: Detect material data changes
        id: data_changes
        if: steps.schedule_gate.outputs.should_refresh == 'true' && steps.site_mode.outputs.mode == 'live'
        shell: bash
        run: |
          if git diff --quiet -- data/*.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Report current coverage and review queue
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: node scripts/report-update-status.mjs
      - name: Run regression tests
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: npm test
      - name: Audit human-readable categories and descriptions
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: npm run audit:taxonomy
      - name: Validate refreshed data
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: npm run validate
      - name: Preserve changed Aarhus data for the next fallback run
        if: steps.schedule_gate.outputs.should_refresh == 'true' && steps.site_mode.outputs.mode == 'live' && steps.data_changes.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "chore: refresh Aarhus grocery deals"
          git push
      - name: Decide whether Pages needs a new deployment
        id: deploy_gate
        if: steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "workflow_dispatch" || "${{ steps.data_changes.outputs.changed }}" == "true" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build least-privilege Pages artifact
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        run: npm run build:pages
      # v6
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
        if: steps.deploy_gate.outputs.should_deploy == 'true'
      # v5
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        if: steps.deploy_gate.outputs.should_deploy == 'true'
        with:
          path: .pages-dist

  deploy:
    needs: update
    if: needs.update.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # v5
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
