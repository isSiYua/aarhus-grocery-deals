name: Update deals and deploy

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. Run both possible Copenhagen 03:30 slots, then
    # keep only the one matching the current Europe/Copenhagen UTC offset.
    - cron: '30 1 * * *'
    - cron: '30 2 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: grocery-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.schedule_gate.outputs.should_run }}
    steps:
      - name: Select the Copenhagen 03:30 schedule
        id: schedule_gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          copenhagen_offset="$(TZ=Europe/Copenhagen date +%z)"
          scheduled_cron="${{ github.event.schedule }}"
          if [[ "$copenhagen_offset" == "+0200" && "$scheduled_cron" == "30 1 * * *" ]] || \
             [[ "$copenhagen_offset" == "+0100" && "$scheduled_cron" == "30 2 * * *" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.schedule_gate.outputs.should_run == 'true'
      - uses: actions/setup-node@v4
        if: steps.schedule_gate.outputs.should_run == 'true'
        with:
          node-version: 20
      - name: Refresh Aarhus and Atlanta offers
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: npm run update
      - name: Run regression tests
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: npm test
      - name: Validate refreshed data
        if: steps.schedule_gate.outputs.should_run == 'true'
        run: npm run validate
      - name: Preserve refreshed data for the next fallback run
        if: steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No data-file changes to commit."
          else
            git commit -m "chore: refresh grocery deals"
            git push
          fi
      - uses: actions/configure-pages@v5
        if: steps.schedule_gate.outputs.should_run == 'true'
      - uses: actions/upload-pages-artifact@v3
        if: steps.schedule_gate.outputs.should_run == 'true'
        with:
          path: .

  deploy:
    needs: update
    if: needs.update.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
