name: Publication gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # v7
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
      - name: Run tests, taxonomy audit and data validation
        run: npm run check
      - name: Build the standalone mobile preview
        run: npm run build:preview
      - name: Reject generated files that were not committed
        run: git diff --exit-code
