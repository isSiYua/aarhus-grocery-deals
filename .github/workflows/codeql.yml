name: CodeQL security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 3 * * 3'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      # v6
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
      # v4
      - uses: github/codeql-action/init@e4c79b4e9ebfe577d446333c2e31ed81079e7b03
        with:
          languages: javascript-typescript
      # v4
      - uses: github/codeql-action/analyze@e4c79b4e9ebfe577d446333c2e31ed81079e7b03
