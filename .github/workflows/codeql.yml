name: CodeQL security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 3 * * 3'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze JavaScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      # v7
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      # v4
      - uses: github/codeql-action/init@e4c79b4e9ebfe577d446333c2e31ed81079e7b03
        with:
          languages: javascript-typescript
      # v4
      - uses: github/codeql-action/analyze@e4c79b4e9ebfe577d446333c2e31ed81079e7b03
